<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkBot Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; color: #e0e0e0; }
    .card { background: #16213e; border: 1px solid #0f3460; }
    .card-header { background: #0f3460; color: #e94560; font-weight: bold; }
    #screen {
      width: 100%;
      max-width: 400px;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #000;
      display: block;
      margin: 0 auto;
    }
    #logs {
      height: 300px;
      overflow-y: auto;
      background: #0d0d0d;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #0f3460;
    }
    .log-entry  { color: #00ff88; margin-bottom: 2px; }
    .log-warn   { color: #ffaa00; margin-bottom: 2px; }
    .log-error  { color: #ff4444; margin-bottom: 2px; }
    .badge-running    { background-color: #00ff88 !important; color: #000 !important; }
    .badge-stopped    { background-color: #ff4444 !important; }
    .badge-installed  { background-color: #00ff88 !important; color: #000 !important; }
    .badge-pending    { background-color: #888 !important; }
    .badge-downloading{ background-color: #ffaa00 !important; color: #000 !important; }
    .badge-installing { background-color: #0dcaf0 !important; color: #000 !important; }
    .badge-failed     { background-color: #ff4444 !important; }
    #status-badge { font-size: 0.9rem; }
    #apk-badge    { font-size: 0.8rem; }
    .btn-start { background: #00ff88; color: #000; border: none; font-weight: bold; }
    .btn-start:hover:not(:disabled) { background: #00cc6a; color: #000; }
    .btn-start:disabled { background: #444; color: #888; border: none; cursor: not-allowed; }
    .btn-stop  { background: #e94560; border: none; font-weight: bold; }
    .btn-stop:hover { background: #c73652; }
    .apk-info { font-size: 0.75rem; color: #888; margin-top: 4px; min-height: 1.2em; }
    .cred-status { font-size: 0.75rem; margin-top: 6px; min-height: 1.2em; }
  </style>
</head>
<body>
<div class="container-fluid py-3">
  <div class="row mb-3">
    <div class="col">
      <h2 class="text-center" style="color:#e94560;">&#128663; ParkBot Dashboard</h2>
    </div>
  </div>

  <div class="row g-3">
    <!-- Left: Controls -->
    <div class="col-md-4">
      <div class="card mb-3">
        <div class="card-header">Steuerung</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Kennzeichen</label>
            <input type="text" id="plate-input" class="form-control bg-dark text-white border-secondary"
                   placeholder="z.B. W123AB" maxlength="10" style="text-transform:uppercase;">
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-start" id="btn-start" onclick="startBot()" disabled>
              &#9654; Start
            </button>
            <button class="btn btn-stop" id="btn-stop" onclick="stopBot()">&#9632; Stop</button>
          </div>
          <div class="apk-info text-center" id="apk-hint">Warte auf App-Installation ...</div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header">Zugangsdaten</div>
        <div class="card-body">
          <div class="mb-2">
            <label class="form-label">E-Mail oder Telefonnummer</label>
            <input type="text" id="cred-login" class="form-control bg-dark text-white border-secondary"
                   placeholder="z.B. max@example.com" autocomplete="username">
          </div>
          <div class="mb-2">
            <label class="form-label">Passwort</label>
            <input type="password" id="cred-password" class="form-control bg-dark text-white border-secondary"
                   placeholder="Passwort" autocomplete="current-password">
          </div>
          <button class="btn btn-sm btn-outline-light w-100" onclick="saveCredentials()">Speichern</button>
          <div class="cred-status text-center" id="cred-status"></div>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header">Status</div>
        <div class="card-body text-center">
          <div class="mb-2">
            <span class="badge badge-stopped px-3 py-2" id="status-badge">Bot: Gestoppt</span>
          </div>
          <div>
            <span class="badge badge-pending px-2 py-1" id="apk-badge">APK: wird geprüft ...</span>
          </div>
          <div class="mt-2 small" id="health-info">Verbindung wird geprüft ...</div>
        </div>
      </div>
    </div>

    <!-- Center: Emulator Screen -->
    <div class="col-md-4">
      <div class="card">
        <div class="card-header">Emulator Screen</div>
        <div class="card-body text-center p-2">
          <img id="screen" src="/video_feed" alt="Emulator Screen"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22600%22><rect width=%22400%22 height=%22600%22 fill=%22%23111%22/><text x=%22200%22 y=%22300%22 fill=%22%23555%22 text-anchor=%22middle%22 font-size=%2220%22>Kein Signal</text></svg>'">
        </div>
      </div>
    </div>

    <!-- Right: Logs -->
    <div class="col-md-4">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          Live Logs
          <button class="btn btn-sm btn-outline-secondary" onclick="clearLogs()">Löschen</button>
        </div>
        <div class="card-body p-2">
          <div id="logs"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const logsDiv     = document.getElementById('logs');
  const statusBadge = document.getElementById('status-badge');
  const apkBadge    = document.getElementById('apk-badge');
  const healthInfo  = document.getElementById('health-info');
  const btnStart    = document.getElementById('btn-start');
  const apkHint     = document.getElementById('apk-hint');
  const credStatus  = document.getElementById('cred-status');

  // ── Logging ──────────────────────────────────────────────────────────────

  function addLog(msg, cls = 'log-entry') {
    const ts  = new Date().toLocaleTimeString('de-AT');
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = `[${ts}] ${msg}`;
    logsDiv.appendChild(div);
    logsDiv.scrollTop = logsDiv.scrollHeight;
    // Limit log entries to 200
    while (logsDiv.children.length > 200) logsDiv.removeChild(logsDiv.firstChild);
  }

  function logClass(msg) {
    const lower = msg.toLowerCase();
    if (lower.includes('fehler') || lower.includes('error') || lower.includes('fehlgeschlagen'))
      return 'log-error';
    if (lower.includes('warte') || lower.includes('nicht gefunden') || lower.includes('warn'))
      return 'log-warn';
    return 'log-entry';
  }

  function clearLogs() { logsDiv.innerHTML = ''; }

  // ── WebSocket ─────────────────────────────────────────────────────────────

  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${wsProto}//${location.host}/ws/logs`);
  ws.onopen    = () => addLog('WebSocket verbunden.');
  ws.onmessage = e  => addLog(e.data, logClass(e.data));
  ws.onerror   = () => addLog('WebSocket Fehler.', 'log-error');
  ws.onclose   = () => {
    addLog('WebSocket getrennt. Reconnect in 3s ...', 'log-warn');
    setTimeout(() => location.reload(), 3000);
  };

  // ── APK status ────────────────────────────────────────────────────────────

  const APK_LABELS = {
    pending:     'APK: wird geprüft ...',
    downloading: 'APK: wird heruntergeladen ...',
    installing:  'APK: wird installiert ...',
    installed:   'APK: installiert ✓',
    failed:      'APK: fehlgeschlagen ✗',
  };

  const APK_HINTS = {
    pending:     'Warte auf App-Installation ...',
    downloading: 'APK wird heruntergeladen, bitte warten ...',
    installing:  'APK wird installiert, bitte warten ...',
    installed:   '',
    failed:      'APK konnte nicht automatisch installiert werden. Datei unter apk/handyparken.apk ablegen und Container neu starten.',
  };

  function updateApkStatus(status) {
    apkBadge.textContent = APK_LABELS[status] || `APK: ${status}`;
    apkBadge.className   = `badge badge-${status} px-2 py-1`;
    apkHint.textContent  = APK_HINTS[status] ?? '';

    const ready = (status === 'installed');
    btnStart.disabled = !ready;
    if (!ready && status === 'failed') {
      apkHint.style.color = '#ff4444';
    } else {
      apkHint.style.color = '#888';
    }
  }

  // ── Bot status ────────────────────────────────────────────────────────────

  function updateBotStatus(running) {
    statusBadge.textContent = running ? 'Bot: Läuft' : 'Bot: Gestoppt';
    statusBadge.className   = `badge ${running ? 'badge-running' : 'badge-stopped'} px-3 py-2`;
  }

  // ── Health poll ───────────────────────────────────────────────────────────

  async function checkHealth() {
    try {
      const data = await fetch('/health').then(r => r.json());
      healthInfo.textContent = `Emulator: ${data.emulator} | Bot: ${data.bot}`;
      updateBotStatus(data.bot === 'running');
      updateApkStatus(data.apk || 'pending');
    } catch {
      healthInfo.textContent = 'Health-Check fehlgeschlagen.';
    }
  }

  // ── Credentials ───────────────────────────────────────────────────────────

  async function checkCredentials() {
    try {
      const data = await fetch('/credentials').then(r => r.json());
      if (data.set) {
        credStatus.textContent = `Gespeichert: ${data.login}`;
        credStatus.style.color = '#00ff88';
      } else {
        credStatus.textContent = 'Keine Zugangsdaten gespeichert.';
        credStatus.style.color = '#ffaa00';
      }
    } catch {
      credStatus.textContent = 'Verbindungsfehler.';
      credStatus.style.color = '#ff4444';
    }
  }

  async function saveCredentials() {
    const login    = document.getElementById('cred-login').value.trim();
    const password = document.getElementById('cred-password').value;
    if (!login || !password) {
      credStatus.textContent = 'Bitte E-Mail/Tel. und Passwort eingeben.';
      credStatus.style.color = '#ff4444';
      return;
    }
    try {
      const data = await fetch('/credentials', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, password })
      }).then(r => r.json());
      if (data.error) {
        credStatus.textContent = `Fehler: ${data.error}`;
        credStatus.style.color = '#ff4444';
      } else {
        credStatus.textContent = `Gespeichert: ${data.login}`;
        credStatus.style.color = '#00ff88';
        document.getElementById('cred-password').value = '';
        addLog(`Zugangsdaten aktualisiert: ${data.login}`);
      }
    } catch (e) {
      credStatus.textContent = `Fehler: ${e}`;
      credStatus.style.color = '#ff4444';
    }
  }

  // ── Controls ──────────────────────────────────────────────────────────────

  async function startBot() {
    const plate = document.getElementById('plate-input').value.trim().toUpperCase();
    if (!plate) { addLog('Bitte Kennzeichen eingeben!', 'log-error'); return; }
    addLog(`Starte Bot für ${plate} ...`);
    try {
      const data = await fetch('/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ license_plate: plate })
      }).then(r => r.json());
      if (data.error) addLog(`Fehler: ${data.error}`, 'log-error');
      else updateBotStatus(true);
    } catch (e) { addLog(`Fehler: ${e}`, 'log-error'); }
  }

  async function stopBot() {
    addLog('Stoppe Bot ...');
    try {
      await fetch('/stop', { method: 'POST' });
      updateBotStatus(false);
    } catch (e) { addLog(`Fehler: ${e}`, 'log-error'); }
  }

  document.getElementById('plate-input').addEventListener('input', function () {
    this.value = this.value.toUpperCase();
  });

  checkHealth();
  checkCredentials();
  setInterval(checkHealth, 5000);
</script>
</body>
</html>
