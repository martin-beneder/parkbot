services:
  emulator:
    image: redroid/redroid:11.0.0-latest
    privileged: true
    ports:
      - "5555:5555"
    volumes:
      - emulator_data:/data
    command:
      - androidboot.redroid_gpu_mode=guest
    restart: unless-stopped

  controller:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - emulator
    environment:
      - TZ=Europe/Vienna
      - ADB_HOST=emulator
      - ADB_PORT=5555
      - HP_LOGIN=${HP_LOGIN:-}
      - HP_PASSWORD=${HP_PASSWORD:-}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./apk:/apk
      - ./frontend:/frontend
    restart: unless-stopped

volumes:
  emulator_data:
